<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<!-- Loading Screen -->
<div id="loading-screen" class="vh-100 d-flex justify-content-center align-items-center">
  <div class="text-center">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h2 class="fw-bold">Preparing Your Quiz...</h2>
    <p class="text-muted">Get ready to test your knowledge!</p>
  </div>
</div>


<!-- Quiz Container -->
<div id="quiz-container" class="vh-100 d-flex justify-content-center align-items-center">
  
  <div class="card shadow-lg border-0 p-4" style="max-width:520px; width:100%;">
    
    <!-- Progress Bar -->
    <div class="progress mb-3" id="quizProgress">
      <div class="progress-bar bg-primary" style="width:10%"></div>
    </div>

    <!-- Question Counter + Timer -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <small id="question-counter" class="text-muted"></small>
      <small class="fw-semibold">⏱ <span id="timer">10</span>s</small>
    </div>

    <!-- Question -->
    <h4 id="question" class="fw-bold text-center mb-4"></h4>

    <!-- Options -->
    <div class="d-grid gap-3 mb-4">
      <button class="btn option-btn"></button>
      <button class="btn option-btn"></button>
      <button class="btn option-btn"></button>
      <button class="btn option-btn"></button>
    </div>

    <!-- Bottom Section -->
    <div class="d-flex justify-content-between align-items-center pt-2 border-top">
      <span id="score" class="fw-semibold">Score: 0</span>
      <button id="next-btn" class="btn btn-success px-4" disabled>
        Next →
      </button>
    </div>

  </div>

</div>


<!-- Result Screen -->
<div id="result-screen" class="d-none vh-100 d-flex justify-content-center align-items-center">

  <div class="card shadow-lg border-0 text-center p-5" style="max-width:420px; width:100%;">
    
    <h2 class="fw-bold text-success mb-3">
      🎉 Quiz Finished!
    </h2>

    <p class="text-muted mb-2">Your Final Score</p>

    <h1 id="final-score" class="display-4 fw-bold mb-4"></h1>

    <button id="restart-btn" class="btn btn-primary btn-lg w-100">
      Restart Quiz
    </button>

  </div>

</div>

  <script src="app.js"></script>

</body>
</html>
